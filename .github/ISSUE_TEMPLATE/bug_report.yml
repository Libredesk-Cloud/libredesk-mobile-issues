name: Bug Report
description: Report unexpected behavior, crashes, or UI issues in Libredesk Mobile.
title: "[Bug] "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible to help us reproduce and fix the issue quickly.

  - type: input
    id: app_version
    attributes:
      label: App version
      description: Found in the app's Settings or About screen.
      placeholder: e.g. 0.2.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Other
    validations:
      required: true

  - type: input
    id: device_model
    attributes:
      label: Device model
      placeholder: e.g. Samsung Galaxy S23, iPhone 14 Pro
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: e.g. Android 14, iOS 17.4
    validations:
      required: true

  - type: input
    id: server_version
    attributes:
      label: Libredesk server version (if known)
      description: Available in your Libredesk admin panel.
      placeholder: e.g. 1.3.0

  - type: dropdown
    id: installation_source
    attributes:
      label: Installation source
      options:
        - Google Play
        - App Store
        - GitHub Release APK
        - TestFlight
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps to reliably reproduce the issue.
      placeholder: |
        1. Open the app
        2. Navigate to ...
        3. Tap on ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag and drop images or video files here if applicable.

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant error messages or crash logs here.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant.
